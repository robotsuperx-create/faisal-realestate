backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "إعدادات الموقع (Site Settings)"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "الإعدادات العامة"
        file: "content/settings.json"
        fields:
          - { label: "اسم الموقع بالعربية", name: "siteName_ar", widget: "string" }
          - { label: "اسم الموقع بالإنجليزية", name: "siteName_en", widget: "string" }
          
          - { label: "العنوان الفرعي للرئيسية بالعربية", name: "heroSubtitle_ar", widget: "string" }
          - { label: "العنوان الفرعي للرئيسية بالإنجليزية", name: "heroSubtitle_en", widget: "string" }
          
          - { label: "عن الشركة بالعربية", name: "aboutSnippet_ar", widget: "text" }
          - { label: "عن الشركة بالإنجليزية", name: "aboutSnippet_en", widget: "text" }
          
          - { label: "عنوان قسم الأمان بالعربية", name: "securityTitle_ar", widget: "string" }
          - { label: "عنوان قسم الأمان بالإنجليزية", name: "securityTitle_en", widget: "string" }
          - { label: "نص قسم الأمان بالعربية", name: "securityText_ar", widget: "text" }
          - { label: "نص قسم الأمان بالإنجليزية", name: "securityText_en", widget: "text" }
          
          - { label: "عنوان نموذج الاتصال بالعربية", name: "ctaTitle_ar", widget: "string" }
          - { label: "عنوان نموذج الاتصال بالإنجليزية", name: "ctaTitle_en", widget: "string" }
          - { label: "العنوان الفرعي للاتصال بالعربية", name: "ctaSubtitle_ar", widget: "string" }
          - { label: "العنوان الفرعي للاتصال بالإنجليزية", name: "ctaSubtitle_en", widget: "string" }
          
          - { label: "المدينة بالعربية", name: "city_ar", widget: "string", default: "تاوريرت" }
          - { label: "المدينة بالإنجليزية", name: "city_en", widget: "string", default: "Taourirt" }
          - { label: "الجهة بالعربية", name: "region_ar", widget: "string", default: "الجهة الشرقية" }
          - { label: "الجهة بالإنجليزية", name: "region_en", widget: "string", default: "Oriental Region" }
          - { label: "الرمز البريدي", name: "postalCode", widget: "string", default: "65800" }
          - { label: "السنة", name: "year", widget: "string", default: "2026" }

  - name: "properties"
    label: "العقارات (Properties)"
    folder: "content/properties"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "المعرف الفرعي (Slug - اسم الملف بالإنجليزية بدون مساحات)", name: "title", widget: "string" }
      - { label: "عنوان العقار بالعربية", name: "title_ar", widget: "string" }
      - { label: "عنوان العقار بالإنجليزية", name: "title_en", widget: "string" }
      - { label: "الموقع بالعربية", name: "location_ar", widget: "string" }
      - { label: "الموقع بالإنجليزية", name: "location_en", widget: "string" }
      - { label: "السعر بالعربية (مثال: 2,500,000 درهم)", name: "price_ar", widget: "string" }
      - { label: "السعر بالإنجليزية (مثال: 2,500,000 MAD)", name: "price_en", widget: "string" }
      - { label: "عدد الغرف", name: "beds", widget: "number" }
      - { label: "عدد الحمامات", name: "baths", widget: "number" }
      - { label: "المساحة بالعربية (مثال: 350 م²)", name: "sqft_ar", widget: "string" }
      - { label: "المساحة بالإنجليزية (مثال: 350 sqm)", name: "sqft_en", widget: "string" }
      - { label: "صورة العقار (رابط أو رفع)", name: "image", widget: "image" }
