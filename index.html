<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فيصل للعقار | عقارات فاخرة في تاوريرت</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* تأكد من وجود تنسيقات style.css الأساسية، وإضافة تحسينات RTL/LTR */
    body {
      background-color: #050505;
      color: #ffffff;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      line-height: 1.6;
    }
    [dir="rtl"] .nav-menu {
      flex-direction: row-reverse;
    }
    [dir="ltr"] .nav-menu {
      flex-direction: row;
    }
    .lang-switch {
      background: transparent;
      border: 1px solid #D4AF37;
      color: #D4AF37;
      padding: 0.4rem 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 3px;
      margin-left: 1rem;
      font-size: 0.9rem;
    }
    .lang-switch:hover {
      background: #D4AF37;
      color: #050505;
    }
  </style>
</head>
<body>

  <nav class="luxury-nav" id="navbar">
    <div class="logo" id="logo-text">فيصل للعقار</div>
    <ul class="nav-menu">
      <li><a href="#" class="nav-link" data-i18n="home">الرئيسية</a></li>
      <li><a href="#" class="nav-link" data-i18n="portfolio">المجموعة</a></li>
      <li><a href="#" class="nav-link" data-i18n="about">من نحن</a></li>
      <li><a href="#" class="nav-link" data-i18n="contact">اتصل بنا</a></li>
    </ul>
    <button class="lang-switch" id="lang-toggle">EN</button>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-subtitle" id="hero-subtitle"></p>
      <div class="hero-cta">
        <a href="#" class="btn-gold" id="cta-primary"></a>
        <a href="#" class="btn-outline-gold" id="cta-secondary"></a>
      </div>
    </div>
  </header>

  <section class="section-padding">
    <h2 class="section-title" id="properties-heading"></h2>
    <div class="gold-underline"></div>
    <p class="section-subtitle" id="properties-subtitle"></p>
    <div class="property-grid" id="property-container"></div>
  </section>

  <section class="section-padding" style="background: rgba(212, 175, 55, 0.02);">
    <div class="about-container">
      <div class="about-image"></div>
      <div class="about-text">
        <h2 id="about-title"></h2>
        <p id="about-snippet"></p>
        <a href="#" class="btn-gold about-btn" data-i18n="discover-story">اكتشف قصتنا</a>
      </div>
    </div>
  </section>

  <section class="section-padding" style="background: #0a0a0a; border-top: 1px solid #D4AF37; border-bottom: 1px solid #D4AF37;">
    <div style="max-width: 800px; margin: 0 auto; text-align: center;">
      <h2 class="gold-highlight" id="security-title" style="font-size: 2rem;"></h2>
      <p id="security-text" style="color: #ccc; margin-top: 1.5rem; font-size: 1.1rem;"></p>
    </div>
  </section>

  <section class="section-padding" style="background: rgba(212, 175, 55, 0.02);">
    <h2 class="section-title" id="testimonials-heading"></h2>
    <div class="gold-underline"></div>
    <p class="section-subtitle" id="testimonials-subtitle"></p>
    <div class="testimonial-grid" id="testimonials-container"></div>
  </section>

  <div class="cta-banner">
    <h2 id="cta-title"></h2>
    <p id="cta-subtitle"></p>
    <a href="#" class="btn-gold cta-btn" data-i18n="enquire-now">استفسر الآن</a>
  </div>

  <footer class="luxury-footer">
    <div class="footer-content">
      <div class="footer-logo" id="footer-name"></div>
      <p class="copyright" id="footer-address"></p>
      <p class="copyright">©️ <span id="footer-year"></span> جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script>
    let siteData = null;
    let propertiesList = [];
    let testimonialsList = [];
    let currentLang = localStorage.getItem('lang') || 'ar';

    document.getElementById('lang-toggle').addEventListener('click', () => {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('lang', currentLang);
      applyLanguage();
    });

    async function fetchAllData() {
      try {
        const [settingsRes, propsListRes, testiListRes] = await Promise.all([
          fetch('/content/settings.json'),
          fetch('/content/properties/list.json'),
          fetch('/content/testimonials/list.json')
        ]);
        siteData = await settingsRes.json();
        const propSlugs = await propsListRes.json();
        const testiSlugs = await testiListRes.json();

        propertiesList = [];
        for (let slug of propSlugs) {
          try {
            const res = await fetch(`/content/properties/${slug}.json`);
            if (res.ok) {
              const data = await res.json();
              propertiesList.push(data);
            }
          } catch (err) { console.warn('فشل تحميل عقار:', slug, err); }
        }

        testimonialsList = [];
        for (let slug of testiSlugs) {
          try {
            const res = await fetch(`/content/testimonials/${slug}.json`);
            if (res.ok) {
              const data = await res.json();
              testimonialsList.push(data);
            }
          } catch (err) { console.warn('فشل تحميل شهادة:', slug, err); }
        }

        applyLanguage();
      } catch (error) {
        console.error('خطأ في جلب البيانات:', error);
        document.getElementById('hero-title').innerHTML = 'فيصل للعقار';
      }
    }

    function getLangData(obj, keyBase, lang) {
      const langKey = `${keyBase}_${lang}`;
      return obj[langKey] !== undefined ? obj[langKey] : obj[keyBase] || '';
    }

    function applyLanguage() {
      const lang = currentLang;
      const isRTL = lang === 'ar';
      document.documentElement.lang = lang;
      document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
      document.getElementById('lang-toggle').textContent = isRTL ? 'EN' : 'عربي';

      if (!siteData) return;

      document.title = getLangData(siteData, 'siteName', lang) + ' | Luxury Real Estate';
      document.getElementById('logo-text').textContent = getLangData(siteData, 'siteName', lang);

      document.getElementById('hero-title').innerHTML = getLangData(siteData, 'heroTitle', lang);
      document.getElementById('hero-subtitle').textContent = getLangData(siteData, 'heroSubtitle', lang);
      document.getElementById('cta-primary').textContent = getLangData(siteData, 'ctaPrimary', lang);
      document.getElementById('cta-secondary').textContent = getLangData(siteData, 'ctaSecondary', lang);

      document.getElementById('properties-heading').textContent = lang === 'ar' ? 'أبرز العقارات' : 'Signature Residences';
      document.getElementById('properties-subtitle').textContent = lang === 'ar' ? 'مختارة بعناية للتميز' : 'Handpicked for Excellence';
      renderProperties(lang);

      document.getElementById('about-title').innerHTML = lang === 'ar' ? 'إرث من <span class="gold-highlight">التميز</span>' : 'Legacy of <span class="gold-highlight">Distinction</span>';
      document.getElementById('about-snippet').textContent = getLangData(siteData, 'aboutSnippet', lang);
      document.querySelector('.about-btn').textContent = lang === 'ar' ? 'اكتشف قصتنا' : 'Discover Our Story';

      document.getElementById('security-title').textContent = getLangData(siteData, 'securityTitle', lang);
      document.getElementById('security-text').textContent = getLangData(siteData, 'securityText', lang);

      document.getElementById('testimonials-heading').textContent = lang === 'ar' ? 'آراء العملاء' : 'Esteemed Clientele';
      document.getElementById('testimonials-subtitle').textContent = lang === 'ar' ? 'أصوات من ذوي المكانة' : 'Voices of Distinction';
      renderTestimonials(lang);

      document.getElementById('cta-title').textContent = getLangData(siteData, 'ctaTitle', lang);
      document.getElementById('cta-subtitle').textContent = getLangData(siteData, 'ctaSubtitle', lang);
      document.querySelector('.cta-btn').textContent = lang === 'ar' ? 'استفسر الآن' : 'Enquire Now';

      document.getElementById('footer-name').textContent = getLangData(siteData, 'siteName', lang);
      document.getElementById('footer-year').textContent = siteData.year || '2025';
      const city = getLangData(siteData, 'city', lang);
      const region = getLangData(siteData, 'region', lang);
      const postal = siteData.postalCode || '65800';
      document.getElementById('footer-address').textContent = `${city}، ${region} ${postal}`;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (key === 'home') el.textContent = lang === 'ar' ? 'الرئيسية' : 'Home';
        else if (key === 'portfolio') el.textContent = lang === 'ar' ? 'المجموعة' : 'Portfolio';
        else if (key === 'about') el.textContent = lang === 'ar' ? 'من نحن' : 'About';
        else if (key === 'contact') el.textContent = lang === 'ar' ? 'اتصل بنا' : 'Contact';
        else if (key === 'discover-story') el.textContent = lang === 'ar' ? 'اكتشف قصتنا' : 'Discover Our Story';
        else if (key === 'enquire-now') el.textContent = lang === 'ar' ? 'استفسر الآن' : 'Enquire Now';
      });
    }

    function renderProperties(lang) {
      const container = document.getElementById('property-container');
      container.innerHTML = '';
      propertiesList.forEach(p => {
        const card = document.createElement('div');
        card.className = 'property-card';
        card.innerHTML = `
          <img src="${p.image || '/assets/images/placeholder.jpg'}" alt="${getLangData(p, 'title', lang)}" class="property-image">
          <div class="property-details">
            <h3>${getLangData(p, 'title', lang)}</h3>
            <div class="property-location">📍 ${getLangData(p, 'location', lang)}</div>
            <div class="property-price">${p.price || ''}</div>
            <div class="property-specs">
              <span>🛏 ${p.beds || 0} ${lang === 'ar' ? 'غرف' : 'Beds'}</span>
              <span>🛁 ${p.baths || 0} ${lang === 'ar' ? 'حمامات' : 'Baths'}</span>
              <span>📐 ${getLangData(p, 'sqft', lang)}</span>
            </div>
            <a href="#" class="btn-card">${lang === 'ar' ? 'عرض العقار' : 'View Property'}</a>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderTestimonials(lang) {
      const container = document.getElementById('testimonials-container');
      container.innerHTML = '';
      testimonialsList.forEach(t => {
        const div = document.createElement('div');
        div.className = 'testimonial-card';
        div.innerHTML = `
          <p class="testimonial-text">“${getLangData(t, 'quote', lang)}”</p>
          <div class="testimonial-author">${getLangData(t, 'author', lang)}</div>
          <div class="testimonial-role">${getLangData(t, 'role', lang)}</div>
        `;
        container.appendChild(div);
      });
    }

    fetchAllData();
  </script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
