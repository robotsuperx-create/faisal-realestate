<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فيصل للعقار | عقارات فاخرة في تاوريرت</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* التنسيقات الفاخرة المدمجة بالكامل لضمان عمل التصميم فوراً */
    :root {
      --gold: #D4AF37;
      --dark-bg: #050505;
      --card-bg: #0a0a0a;
      --text: #ffffff;
      --text-muted: #ccc;
    }

    body {
      background-color: var(--dark-bg);
      color: var(--text);
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    .section-padding {
      padding: 5rem 10%;
    }

    /* Navbar */
    .luxury-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 10%;
      background: rgba(5, 5, 5, 0.95);
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 2rem;
      margin: 0;
      padding: 0;
    }

    [dir="rtl"] .nav-menu { flex-direction: row-reverse; }
    [dir="ltr"] .nav-menu { flex-direction: row; }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      font-weight: 400;
      transition: color 0.3s;
    }

    .nav-link:hover {
      color: var(--gold);
    }

    .lang-switch {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 0.4rem 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 3px;
      font-size: 0.9rem;
    }

    .lang-switch:hover {
      background: var(--gold);
      color: var(--dark-bg);
    }

    /* Hero */
    .hero {
      height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(rgba(5,5,5,0.7), rgba(5,5,5,0.9)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80') center/cover;
      padding: 0 1rem;
    }

    .hero-content {
      max-width: 800px;
    }

    .hero-title {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    .hero-subtitle {
      font-size: 1.3rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .hero-cta {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }

    .btn-gold, .btn-outline-gold, .btn-card {
      padding: 0.8rem 2rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border-radius: 2px;
      cursor: pointer;
      display: inline-block;
    }

    .btn-gold, .btn-card {
      background: var(--gold);
      color: var(--dark-bg);
      border: 1px solid var(--gold);
    }

    .btn-gold:hover, .btn-card:hover {
      background: transparent;
      color: var(--gold);
    }

    .btn-outline-gold {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
    }

    .btn-outline-gold:hover {
      background: var(--gold);
      color: var(--dark-bg);
    }

    /* Headings */
    .section-title {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .gold-underline {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 1.5rem auto;
    }

    .section-subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 3rem;
    }

    .gold-highlight {
      color: var(--gold);
    }

    /* Grid layout */
    .property-grid, .testimonial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2.5rem;
    }

    /* Cards */
    .property-card {
      background: var(--card-bg);
      border: 1px solid rgba(212, 175, 55, 0.1);
      transition: transform 0.3s, border-color 0.3s;
      border-radius: 4px;
      overflow: hidden;
    }

    .property-card:hover {
      transform: translateY(-5px);
      border-color: var(--gold);
    }

    .property-image {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .property-details {
      padding: 1.5rem;
    }

    .property-details h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.4rem;
    }

    .property-location {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .property-price {
      color: var(--gold);
      font-weight: 700;
      font-size: 1.2rem;
      margin: 0.8rem 0;
    }

    .property-specs {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 0.8rem;
      margin-bottom: 1rem;
    }

    /* About Section */
    .about-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
      align-items: center;
    }

    .about-image {
      width: 100%;
      height: 350px;
      background: url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=800&q=80') center/cover;
      border-radius: 4px;
      border: 1px solid rgba(212, 175, 55, 0.1);
    }

    /* Testimonial Card */
    .testimonial-card {
      background: var(--card-bg);
      padding: 2rem;
      border-left: 3px solid var(--gold);
      border-radius: 4px;
    }

    .testimonial-text {
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .testimonial-author {
      font-weight: 600;
      color: var(--gold);
    }

    .testimonial-role {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* CTA Banner */
    .cta-banner {
      background: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.85)), url('https://images.unsplash.com/photo-1600566753376-12c8ab7fb75b?auto=format&fit=crop&w=1920&q=80') center/cover;
      text-align: center;
      padding: 4rem 1rem;
      border-top: 1px solid var(--gold);
    }

    /* Footer */
    .luxury-footer {
      background: #020202;
      padding: 3rem 10%;
      text-align: center;
      border-top: 1px solid rgba(212, 175, 55, 0.05);
      font-size: 0.9rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <nav class="luxury-nav" id="navbar">
    <div class="logo" id="logo-text"></div>
    <ul class="nav-menu">
      <li><a href="#hero" class="nav-link" data-i18n="home"></a></li>
      <li><a href="#properties" class="nav-link" data-i18n="portfolio"></a></li>
      <li><a href="#about" class="nav-link" data-i18n="about"></a></li>
      <li><a href="#cta" class="nav-link" data-i18n="contact"></a></li>
    </ul>
    <button class="lang-switch" id="lang-toggle">EN</button>
  </nav>

  <header class="hero" id="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-subtitle" id="hero-subtitle"></p>
      <div class="hero-cta">
        <a href="#properties" class="btn-gold" id="cta-primary" data-i18n="cta-explore"></a>
        <a href="#cta" class="btn-outline-gold" id="cta-secondary" data-i18n="cta-tour"></a>
      </div>
    </div>
  </header>

  <section class="section-padding" id="properties">
    <h2 class="section-title" id="properties-heading"></h2>
    <div class="gold-underline"></div>
    <p class="section-subtitle" id="properties-subtitle"></p>
    <div class="property-grid" id="property-container"></div>
  </section>

  <section class="section-padding" id="about" style="background: rgba(212, 175, 55, 0.02);">
    <div class="about-container">
      <div class="about-image"></div>
      <div class="about-text">
        <h2 id="about-title"></h2>
        <p id="about-snippet"></p>
        <a href="#cta" class="btn-gold about-btn" id="about-btn" data-i18n="discover-story"></a>
      </div>
    </div>
  </section>

  <section class="section-padding" id="security" style="background: #0a0a0a; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);">
    <div style="max-width: 800px; margin: 0 auto; text-align: center;">
      <h2 class="gold-highlight" id="security-title" style="font-size: 2rem;"></h2>
      <p id="security-text" style="color: #ccc; margin-top: 1.5rem; font-size: 1.1rem;"></p>
    </div>
  </section>

  <section class="section-padding" id="testimonials" style="background: rgba(212, 175, 55, 0.02);">
    <h2 class="section-title" id="testimonials-heading"></h2>
    <div class="gold-underline"></div>
    <p class="section-subtitle" id="testimonials-subtitle"></p>
    <div class="testimonial-grid" id="testimonials-container"></div>
  </section>

  <div class="cta-banner" id="cta">
    <h2 id="cta-title"></h2>
    <p id="cta-subtitle"></p>
    <a href="mailto:contact@faisal.app" class="btn-gold cta-btn" id="cta-btn" data-i18n="enquire-now"></a>
  </div>

  <footer class="luxury-footer">
    <div class="footer-content">
      <div class="footer-logo" id="footer-name"></div>
      <p class="copyright" id="footer-address"></p>
      <p class="copyright">©️ <span id="footer-year">2026</span> <span id="footer-rights"></span></p>
    </div>
  </footer>

  <script>
    let siteData = null;
    let propertiesList = [];
    let currentLang = localStorage.getItem('lang') || 'ar';

    document.getElementById('lang-toggle').addEventListener('click', () => {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('lang', currentLang);
      applyLanguage();
    });

    async function fetchAllData() {
      try {
        const [settingsRes, propsListRes] = await Promise.all([
          fetch('/content/settings.json'),
          fetch('/content/properties/list.json')
        ]);
        siteData = await settingsRes.json();
        const propSlugs = await propsListRes.json();

        propertiesList = [];
        for (let slug of propSlugs) {
          try {
            const res = await fetch(`/content/properties/${slug}.json`);
            if (res.ok) {
              const data = await res.json();
              propertiesList.push(data);
            }
          } catch (err) { console.warn('فشل تحميل عقار:', slug, err); }
        }

        applyLanguage();
      } catch (error) {
        console.error('خطأ جلب البيانات، تشغيل الوضع الثابت المباشر:', error);
        applyLanguage();
      }
    }

    function getLangData(obj, keyBase, lang) {
      const langKey = `${keyBase}_${lang}`;
      return obj && obj[langKey] !== undefined ? obj[langKey] : (obj ? obj[keyBase] : '') || '';
    }

    function applyLanguage() {
      const lang = currentLang;
      const isRTL = lang === 'ar';
      document.documentElement.lang = lang;
      document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
      document.getElementById('lang-toggle').textContent = isRTL ? 'EN' : 'عربي';

      if (siteData) {
        document.title = getLangData(siteData, 'siteName', lang) + ' | Luxury Real Estate';
        document.getElementById('logo-text').textContent = getLangData(siteData, 'siteName', lang);
        document.getElementById('hero-title').textContent = getLangData(siteData, 'siteName', lang);
        document.getElementById('hero-subtitle').textContent = getLangData(siteData, 'heroSubtitle', lang);
        document.getElementById('about-snippet').textContent = getLangData(siteData, 'aboutSnippet', lang);
        document.getElementById('security-title').textContent = getLangData(siteData, 'securityTitle', lang);
        document.getElementById('security-text').textContent = getLangData(siteData, 'securityText', lang);
        document.getElementById('cta-title').textContent = getLangData(siteData, 'ctaTitle', lang);
        document.getElementById('cta-subtitle').textContent = getLangData(siteData, 'ctaSubtitle', lang);
        document.getElementById('footer-name').textContent = getLangData(siteData, 'siteName', lang);
        document.getElementById('footer-year').textContent = siteData.year || '2026';
        
        const city = getLangData(siteData, 'city', lang);
        const region = getLangData(siteData, 'region', lang);
        const postal = siteData.postalCode || '65800';
        document.getElementById('footer-address').textContent = `${city}، ${region} ${postal}`;
      } else {
        // نصوص ثابتة آمنة ومترجمة 100% بدون أي تداخل
        if (isRTL) {
          document.getElementById('logo-text').textContent = "فيصل للعقار";
          document.getElementById('hero-title').textContent = "فيصل للعقار";
          document.getElementById('hero-subtitle').textContent = "اكتشف الفخامة الحقيقية في تاوريرت";
          document.getElementById('about-title').innerHTML = `إرث من <span class="gold-highlight">التميز</span>`;
          document.getElementById('about-snippet').textContent = "فيصل للعقار ليست مجرد علامة - إنها بيان للذوق الرفيع. نقدم أفضل العناوين السكنية والتجارية في المنطقة الشرقية.";
          document.getElementById('security-title').textContent = "أمان وموثوقية تعاملاتكم";
          document.getElementById('security-text').textContent = "نحن نضمن السرية التامة والاحترافية الكاملة في كافة مراحل بيع وشراء العقارات الفاخرة.";
          document.getElementById('cta-title').textContent = "هل أنت جاهز للخطوة القادمة؟";
          document.getElementById('cta-subtitle').textContent = "تواصل مع مستشارينا العقاريين اليوم";
          document.getElementById('footer-name').textContent = "فيصل للعقار";
          document.getElementById('footer-address').textContent = "تاوريرت، الجهة الشرقية";
          document.getElementById('footer-rights').textContent = "جميع الحقوق محفوظة.";
        } else {
          document.getElementById('logo-text').textContent = "FAISAL PROPERTIES";
          document.getElementById('hero-title').textContent = "FAISAL PROPERTIES";
          document.getElementById('hero-subtitle').textContent = "Discover True Luxury in Taourirt";
          document.getElementById('about-title').innerHTML = `A Legacy of <span class="gold-highlight">Excellence</span>`;
          document.getElementById('about-snippet').textContent = "Faisal Properties is not just a brand - it's a statement of refined taste. We offer the finest residential and commercial addresses in the Oriental region.";
          document.getElementById('security-title').textContent = "Secure & Trusted Transactions";
          document.getElementById('security-text').textContent = "We guarantee absolute confidentiality and full professionalism throughout every stage of buying or selling luxury estates.";
          document.getElementById('cta-title').textContent = "Ready for the Next Step?";
          document.getElementById('cta-subtitle').textContent = "Contact our luxury estate consultants today.";
          document.getElementById('footer-name').textContent = "FAISAL PROPERTIES";
          document.getElementById('footer-address').textContent = "Taourirt, Oriental Region";
          document.getElementById('footer-rights').textContent = "All rights reserved.";
        }
      }

      // عناوين الأقسام الثابتة
      document.getElementById('properties-heading').textContent = isRTL ? 'أبرز العقارات' : 'Signature Residences';
      document.getElementById('properties-subtitle').textContent = isRTL ? 'مختارة بعناية للتميز' : 'Handpicked for Excellence';
      document.getElementById('testimonials-heading').textContent = isRTL ? 'آراء العملاء' : 'Esteemed Clientele';
      document.getElementById('testimonials-subtitle').textContent = isRTL ? 'أصوات من ذوي المكانة' : 'Voices of Distinction';

      // ترجمة روابط الـ Navbar والـ CTAs
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (key === 'home') el.textContent = isRTL ? 'الرئيسية' : 'Home';
        else if (key === 'portfolio') el.textContent = isRTL ? 'المجموعة' : 'Portfolio';
        else if (key === 'about') el.textContent = isRTL ? 'من نحن' : 'About';
        else if (key === 'contact') el.textContent = isRTL ? 'اتصل بنا' : 'Contact';
        else if (key === 'cta-explore') el.textContent = isRTL ? 'استكشف المجموعة' : 'Explore Collection';
        else if (key === 'cta-tour') el.textContent = isRTL ? 'جولة افتراضية' : 'Virtual Tour';
        else if (key === 'discover-story') el.textContent = isRTL ? 'اكتشف قصتنا' : 'Our Story';
        else if (key === 'enquire-now') el.textContent = isRTL ? 'استفسر الآن' : 'Enquire Now';
      });

      renderProperties(lang);
      renderTestimonials(lang);
    }

    function renderProperties(lang) {
      const container = document.getElementById('property-container');
      if (!container) return;
      container.innerHTML = '';

      if (propertiesList.length === 0) {
        const sampleProps = [
          { title_ar: "إقامة الشرف الفاخرة", title_en: "The Sharaf Luxury Estate", location_ar: "تاوريرت، وسط المدينة", location_en: "Taourirt, City Center", price_ar: "2,400,000 درهم", price_en: "2,400,000 MAD", beds: 5, baths: 4, sqft_ar: "320 م²", sqft_en: "320 sqm", image: "https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=800&q=80" },
          { title_ar: "فيلا النخيل العصرية", title_en: "Modern Palms Villa", location_ar: "تاوريرت، الحي الراقي", location_en: "Taourirt, Premium District", price_ar: "3,100,000 درهم", price_en: "3,100,000 MAD", beds: 4, baths: 3, sqft_ar: "280 م²", sqft_en: "280 sqm", image: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80" }
        ];
        sampleProps.forEach(p => appendCard(container, p, lang));
        return;
      }
      propertiesList.forEach(p => appendCard(container, p, lang));
    }

    function appendCard(container, p, lang) {
      const isAr = lang === 'ar';
      const card = document.createElement('div');
      card.className = 'property-card';
      card.innerHTML = `
        <img src="${p.image || 'https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=800&q=80'}" alt="${isAr ? p.title_ar : p.title_en}" class="property-image">
        <div class="property-details">
          <h3>${isAr ? p.title_ar : p.title_en}</h3>
          <div class="property-location">📍 ${isAr ? p.location_ar : p.location_en}</div>
          <div class="property-price">${isAr ? p.price_ar : p.price_en}</div>
          <div class="property-specs">
            <span>🛏 ${p.beds || 0} ${isAr ? 'غرف' : 'Beds'}</span>
            <span>🛁 ${p.baths || 0} ${isAr ? 'حمامات' : 'Baths'}</span>
            <span>📐 ${isAr ? p.sqft_ar : p.sqft_en}</span>
          </div>
          <a href="#cta" class="btn-card" style="margin-top: 1rem; display: inline-block;">${isAr ? 'عرض العقار' : 'View Property'}</a>
        </div>
      `;
      container.appendChild(card);
    }

    function renderTestimonials(lang) {
      const container = document.getElementById('testimonials-container');
      if (!container) return;
      container.innerHTML = '';

      const sampleTestis = [
        { quote_ar: "تعامل احترافي للغاية ومصداقية تامة في المواعيد. المعاملة كانت ممتازة.", quote_en: "Absolute transparency and elite service. Highly recommended for premium acquisitions.", author_ar: "الحاج محمد بنعلي", author_en: "M. Benali", role_ar: "مستثمر عقاري", role_en: "Property Investor" }
      ];

      sampleTestis.forEach(t => {
        const div = document.createElement('div');
        div.className = 'testimonial-card';
        div.innerHTML = `
          <p class="testimonial-text">“${lang === 'ar' ? t.quote_ar : t.quote_en}”</p>
          <div class="testimonial-author">${lang === 'ar' ? t.author_ar : t.author_en}</div>
          <div class="testimonial-role">${lang === 'ar' ? t.role_ar : t.role_en}</div>
        `;
        container.appendChild(div);
      });
    }

    fetchAllData();
  </script>
</body>
</html>
